name: Native Image

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out and build (defaults to the ref that triggered the workflow)'
        required: false
        type: string

jobs:
  build_images:
    name: 'Build Native Image ${{ matrix.platform }}'
    strategy:
      matrix:
        os: [ macos-15, windows-latest, ubuntu-latest ]
        include:
          - os: 'ubuntu-latest'
            platform: 'linux-amd64'
          - os: 'macos-15'
            platform: 'darwin-arm64'
          - os: 'windows-latest'
            platform: 'win-amd64'
          - os: 'ubuntu-22.04-arm'
            platform: 'linux-arm64'
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Produce native binary
        shell: bash
        run: |
          npm install
          npm run build:binary -w asciidoctor

      - name: Upload native image artifact
        uses: actions/upload-artifact@v7
        with:
          name: "native-image-${{ matrix.platform }}"
          path: "packages/asciidoctor/dist/asciidoctor-${{ matrix.platform }}*"
