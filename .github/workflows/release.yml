name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v2.1.3
  workflow_dispatch:
    inputs:
      skip_publish:
        description: 'Skip publish (e.g. if already published)'
        type: boolean
        default: false

permissions:
  id-token: write  # Required for OIDC
  contents: write  # Required by docs job in build.yml

jobs:
  build:
    if: github.repository_owner == 'asciidoctor'
    uses: ./.github/workflows/build.yml
  publish:
    if: github.repository_owner == 'asciidoctor' && !inputs.skip_publish
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      # install dependencies
      - name: Install dependencies
        run: |
          npm ci
      # build
      - name: Build core
        run: npm run build --prefix packages/core
      # publish
      - name: Publish
        run: ./scripts/publish.sh
      - name: Make sure that @asciidoctor/core has been published on npmjs
        run: |
          timeout 60s ./scripts/wait-asciidoctor-core-published.sh
  upload:
    needs: [ build, publish ]
    if: always() && needs.build.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Generate release notes
        run: node tasks/changelog.js ${{ github.ref_name }}
      - name: Download native image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-image-*
          path: packages/asciidoctor/dist
          merge-multiple: true
      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            packages/asciidoctor/dist/asciidoctor-linux-arm64 \
            packages/asciidoctor/dist/asciidoctor-linux-amd64 \
            packages/asciidoctor/dist/asciidoctor-darwin-arm64 \
            packages/asciidoctor/dist/asciidoctor-win-amd64.exe
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Announcement
        uses: zulip/github-actions-zulip/send-message@v1
        with:
          email: ${{ secrets.ZULIP_USERNAME }}
          api-key: ${{ secrets.ZULIP_API_KEY }}
          organization-url: 'https://asciidoctor.zulipchat.com'
          to: '279652'
          type: 'stream'
          topic: 'releases'
          content: |
            Asciidoctor.js ${{ env.RELEASE_VERSION }} is out!

            https://github.com/asciidoctor/asciidoctor.js/releases/tag/${{ env.RELEASE_VERSION }}

  docs:
    if: always() && github.repository_owner == 'asciidoctor' && needs.build.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Generate API documentation
        run: npm run docs --prefix packages/core
      - name: Compute docs destination folder
        id: dest
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-(alpha|beta|rc)\. ]]; then
            echo "folder=${BASH_REMATCH[1]}-dev" >> "$GITHUB_OUTPUT"
          else
            echo "folder=$TAG" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages/core/build/docs
          target-folder: ${{ steps.dest.outputs.folder }}
